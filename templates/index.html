<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Rampage Item Parser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d1117;
      --sidebar:      #161b22;
      --sidebar-bdr:  #21262d;
      --surface:      #1c2128;
      --surface2:     #22272e;
      --text:         #c9d1d9;
      --text-dim:     #6e7681;
      --accent:       #388bfd;
      --accent-hover: #58a6ff;
      --border:       #30363d;
      --green:        #2ea043;
      --green-bg:     #0f2010;
      --green-text:   #56d364;
      --red:          #da3633;
      --red-bg:       #200d0d;
      --red-text:     #f85149;
      --amber:        #9e6a03;
      --amber-bg:     #1f1b0d;
      --amber-text:   #e3b341;
      --code-bg:      #0d1117;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }

    /* ── LAYOUT ────────────────────────────────── */
    .layout { display: flex; height: 100vh; }

    /* ── SIDEBAR ───────────────────────────────── */
    .sidebar {
      width: 220px; min-width: 220px;
      background: var(--sidebar);
      border-right: 1px solid var(--sidebar-bdr);
      display: flex; flex-direction: column;
      overflow-y: auto; overflow-x: hidden;
      padding: 14px 10px;
      gap: 2px;
    }

    .app-title {
      font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 6px 10px;
      border-bottom: 1px solid var(--sidebar-bdr);
      margin-bottom: 6px;
    }

    .section-lbl {
      font-size: 10px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-dim); padding: 8px 6px 3px;
    }

    .sep { height: 1px; background: var(--sidebar-bdr); margin: 6px 0; }

    .btn {
      display: block; width: 100%;
      padding: 6px 10px;
      border: none; border-radius: 6px;
      cursor: pointer; font-size: 12px; text-align: left;
      background: transparent; color: var(--text);
      transition: background .12s;
    }
    .btn:hover { background: rgba(255,255,255,.06); }
    .btn.running { opacity: .5; pointer-events: none; }

    .btn-diff {
      background: #162032; color: var(--accent-hover);
      font-weight: 600; margin-bottom: 2px;
    }
    .btn-diff:hover { background: #1c2c45; }

    .btn-all { color: var(--accent-hover); font-weight: 600; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
    .grid2 .btn { text-align: center; padding: 5px 2px; }

    /* Output toggle */
    .out-toggle {
      display: flex; border-radius: 6px; overflow: hidden;
      border: 1px solid var(--border); margin: 3px 0 6px;
    }
    .out-toggle button {
      flex: 1; padding: 5px; border: none;
      background: transparent; color: var(--text-dim);
      cursor: pointer; font-size: 11px; transition: all .12s;
    }
    .out-toggle button.active { background: var(--accent); color: #fff; }

    /* Settings */
    .settings-hdr {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 6px; cursor: pointer; border-radius: 6px;
      color: var(--text-dim); font-size: 11px;
    }
    .settings-hdr:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .settings-arr { margin-left: auto; font-size: 9px; }

    .settings-body {
      display: none; flex-direction: column; gap: 8px;
      padding: 8px 4px 4px;
    }
    .settings-body.open { display: flex; }

    .field label { display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 3px; }
    .field input {
      width: 100%; padding: 4px 7px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-size: 11px; font-family: monospace;
    }
    .field input:focus { outline: none; border-color: var(--accent); }

    /* ── MAIN CONTENT ──────────────────────────── */
    .content { flex: 1; overflow-y: auto; padding: 24px 28px; }

    .welcome {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; text-align: center; color: var(--text-dim);
    }
    .welcome h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
    .welcome p { max-width: 360px; line-height: 1.65; }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 80px; color: var(--text-dim); }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-box { background: var(--red-bg); border: 1px solid var(--red); border-radius: 8px; padding: 16px; color: var(--red-text); line-height: 1.5; }

    /* Result header */
    .result-hdr { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .result-title { font-size: 17px; font-weight: 600; }

    .dl-btn {
      padding: 5px 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); cursor: pointer; text-decoration: none; font-size: 12px;
      transition: background .12s;
    }
    .dl-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── DIFF ──────────────────────────────────── */
    .diff-summary {
      display: flex; gap: 0;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden; margin-bottom: 22px;
    }
    .diff-stat {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 14px 8px; gap: 3px;
      border-right: 1px solid var(--border);
    }
    .diff-stat:last-child { border-right: none; }
    .diff-stat .num { font-size: 26px; font-weight: 700; }
    .diff-stat .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); }
    .num.green { color: var(--green-text); }
    .num.red   { color: var(--red-text); }
    .num.amber { color: var(--amber-text); }

    .diff-section { margin-bottom: 20px; }
    .diff-section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
      padding-bottom: 7px; margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .diff-section-title.green { color: var(--green-text); }
    .diff-section-title.red   { color: var(--red-text); }
    .diff-section-title.amber { color: var(--amber-text); }

    .diff-item { border-radius: 6px; margin-bottom: 3px; overflow: hidden; border: 1px solid transparent; }
    .item-new     { border-color: #1a3a1a; }
    .item-removed { border-color: #3a1a1a; }
    .item-changed { border-color: #3a2e10; }

    .diff-item-hdr {
      padding: 7px 12px;
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; user-select: none;
    }
    .item-new     .diff-item-hdr { background: var(--green-bg); color: var(--green-text); }
    .item-removed .diff-item-hdr { background: var(--red-bg);   color: var(--red-text); }
    .item-changed .diff-item-hdr { background: var(--amber-bg); color: var(--amber-text); }
    .diff-item-hdr:hover { filter: brightness(1.15); }

    .badge {
      font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 700;
    }
    .item-new     .badge { background: var(--green); color: #fff; }
    .item-removed .badge { background: var(--red);   color: #fff; }
    .item-changed .badge { background: var(--amber);  color: #fff; }

    .diff-fields { display: none; }
    .diff-fields.open { display: block; }

    .diff-field-row {
      display: grid; grid-template-columns: 180px 1fr 1fr;
      gap: 6px; padding: 5px 12px; font-size: 11px;
      border-top: 1px solid rgba(255,255,255,.04);
      font-family: 'Cascadia Code', Consolas, monospace;
    }
    .item-changed .diff-field-row { background: var(--amber-bg); }
    .field-name { color: var(--text-dim); }
    .field-old  { color: var(--red-text); }
    .field-new  { color: var(--green-text); }

    .no-changes { text-align: center; color: var(--text-dim); padding: 60px 0; }

    /* ── PARSE RESULT ──────────────────────────── */
    .parse-result pre {
      background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; overflow-x: auto;
      font-family: 'Cascadia Code', Consolas, monospace;
      font-size: 12px; line-height: 1.65; color: #c9d1d9;
      white-space: pre-wrap; word-break: break-all;
    }

    /* ── ALL FILES GRID ────────────────────────── */
    .files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .file-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px 14px; display: flex; flex-direction: column; gap: 12px;
    }
    .file-card-name { font-weight: 600; font-size: 14px; text-transform: capitalize; }
    .file-card-sub  { font-size: 11px; color: var(--text-dim); }
  </style>
</head>
<body>
<div class="layout">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="app-title">Magic Rampage Parser</div>

    <!-- Settings -->
    <div class="settings-hdr" onclick="toggleSettings()">
      <span>⚙</span><span>Settings</span>
      <span class="settings-arr" id="s-arrow">▶</span>
    </div>
    <div class="settings-body" id="s-body">
      <div class="field">
        <label>Items Folder</label>
        <input id="s-items" type="text">
      </div>
      <div class="field">
        <label>Enemy Dirs (semicolon-separated)</label>
        <input id="s-enemy" type="text">
      </div>
      <div class="field">
        <label>Online URL</label>
        <input id="s-url" type="text">
      </div>
      <div class="field">
        <label>Baseline (items.json path)</label>
        <input id="s-baseline" type="text">
      </div>
    </div>

    <div class="sep"></div>

    <!-- Output type -->
    <div class="section-lbl">Output Type</div>
    <div class="out-toggle">
      <button id="btn-normal" class="active" onclick="setOut('normal')">Normal</button>
      <button id="btn-dev" onclick="setOut('developer')">Developer</button>
    </div>

    <div class="sep"></div>

    <!-- Diff -->
    <button class="btn btn-diff" id="ab-diff" onclick="run('diff')">🔍 Check Diff</button>

    <div class="sep"></div>

    <!-- Items -->
    <div class="section-lbl">Items</div>
    <button class="btn btn-all" id="ab-all" onclick="run('all')">Parse All</button>
    <div class="grid2">
      <button class="btn" id="ab-armor"  onclick="run('armor')">Armor</button>
      <button class="btn" id="ab-ring"   onclick="run('ring')">Ring</button>
      <button class="btn" id="ab-sword"  onclick="run('sword')">Sword</button>
      <button class="btn" id="ab-hammer" onclick="run('hammer')">Hammer</button>
      <button class="btn" id="ab-spear"  onclick="run('spear')">Spear</button>
      <button class="btn" id="ab-staff"  onclick="run('staff')">Staff</button>
      <button class="btn" id="ab-dagger" onclick="run('dagger')">Dagger</button>
      <button class="btn" id="ab-axe"    onclick="run('axe')">Axe</button>
    </div>

    <div class="sep"></div>

    <!-- Other -->
    <div class="section-lbl">Other</div>
    <div class="grid2">
      <button class="btn" id="ab-class"  onclick="run('class')">Classes</button>
      <button class="btn" id="ab-enemy"  onclick="run('enemy')">Enemies</button>
    </div>
  </aside>

  <!-- ── MAIN CONTENT ──────────────────────────────────── -->
  <main class="content" id="content">
    <div class="welcome">
      <h2>Magic Rampage Item Parser</h2>
      <p>Choose an action from the sidebar. Configure paths in Settings if your Steam installation differs from the default.</p>
    </div>
  </main>

</div>
<script>
  const DEFAULTS = {
    items:    String.raw`C:\Program Files (x86)\Steam\steamapps\common\Magic Rampage\items`,
    enemy:    String.raw`C:\Program Files (x86)\Steam\steamapps\common\Magic Rampage\npcs\enemies;C:\Program Files (x86)\Steam\steamapps\common\Magic Rampage\npcs\bosses`,
    url:      'https://gist.githubusercontent.com/andresan87/5670c559e5a930129aa03dfce7827306/raw/items.json',
    baseline: 'items.json',
  };

  let outputType = 'normal';
  let activeAction = null;

  // ── SETTINGS ────────────────────────────────────────────
  function loadSettings() {
    document.getElementById('s-items').value    = localStorage.getItem('items')    || DEFAULTS.items;
    document.getElementById('s-enemy').value    = localStorage.getItem('enemy')    || DEFAULTS.enemy;
    document.getElementById('s-url').value      = localStorage.getItem('url')      || DEFAULTS.url;
    document.getElementById('s-baseline').value = localStorage.getItem('baseline') || DEFAULTS.baseline;
    outputType = localStorage.getItem('outputType') || 'normal';
    setOut(outputType, false);
  }

  ['s-items','s-enemy','s-url','s-baseline'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      localStorage.setItem(id.replace('s-',''), document.getElementById(id).value);
    });
  });

  function toggleSettings() {
    const body = document.getElementById('s-body');
    const arrow = document.getElementById('s-arrow');
    body.classList.toggle('open');
    arrow.textContent = body.classList.contains('open') ? '▼' : '▶';
  }

  function setOut(type, save = true) {
    outputType = type;
    document.getElementById('btn-normal').classList.toggle('active', type === 'normal');
    document.getElementById('btn-dev').classList.toggle('active', type === 'developer');
    if (save) localStorage.setItem('outputType', type);
  }

  function getSettings() {
    return {
      items_folder: document.getElementById('s-items').value    || DEFAULTS.items,
      enemy_dirs:  (document.getElementById('s-enemy').value    || DEFAULTS.enemy).split(';').map(s=>s.trim()).filter(Boolean),
      online_url:   document.getElementById('s-url').value      || DEFAULTS.url,
      baseline:     document.getElementById('s-baseline').value || DEFAULTS.baseline,
    };
  }

  // ── ACTIONS ─────────────────────────────────────────────
  const LABELS = {
    diff: 'Running diff check…', all: 'Parsing all items…',
    class: 'Parsing classes…', enemy: 'Parsing enemies…',
  };

  function setContent(html) { document.getElementById('content').innerHTML = html; }

  function setBusy(action, busy) {
    const el = document.getElementById('ab-' + action);
    if (el) el.classList.toggle('running', busy);
  }

  async function run(action) {
    if (activeAction) return;
    activeAction = action;
    setBusy(action, true);
    setContent(`<div class="loading"><div class="spinner"></div><span>${LABELS[action] || 'Parsing ' + action + '…'}</span></div>`);

    try {
      const res = await fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, output_type: outputType, ...getSettings() }),
      });
      const data = await res.json();

      if (data.error) {
        setContent(`<div class="error-box"><strong>Error:</strong> ${esc(data.error)}</div>`);
      } else if (data.type === 'diff')  renderDiff(data);
      else if (data.type === 'parse') renderParse(data);
      else if (data.type === 'all')   renderAll(data);
    } catch (e) {
      setContent(`<div class="error-box"><strong>Error:</strong> ${esc(e.message)}</div>`);
    } finally {
      setBusy(action, false);
      activeAction = null;
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── DIFF RENDERER ───────────────────────────────────────
  function renderDiff(data) {
    const { new_items, removed_items, changes, filename } = data;
    const changedNames = Object.keys(changes);
    const noChanges = !new_items.length && !removed_items.length && !changedNames.length;

    let h = `
      <div class="result-hdr">
        <span class="result-title">Diff Report</span>
        <a class="dl-btn" href="/download/${filename}">⬇ Download Report</a>
      </div>
      <div class="diff-summary">
        <div class="diff-stat"><span class="num green">${new_items.length}</span><span class="lbl">New</span></div>
        <div class="diff-stat"><span class="num red">${removed_items.length}</span><span class="lbl">Removed</span></div>
        <div class="diff-stat"><span class="num amber">${changedNames.length}</span><span class="lbl">Changed</span></div>
      </div>`;

    if (noChanges) {
      h += `<div class="no-changes">✓ No changes detected since the baseline.</div>`;
    }

    if (new_items.length) {
      h += `<div class="diff-section">
        <div class="diff-section-title green">In game, missing from gist (${new_items.length})</div>`;
      for (const item of new_items) {
        h += `<div class="diff-item item-new">
          <div class="diff-item-hdr">
            <span class="badge">NEW</span>
            <span>${esc(item.name)}</span>
            <span style="margin-left:auto;font-size:11px;opacity:.6">${esc(item.secondary_type)}</span>
          </div></div>`;
      }
      h += `</div>`;
    }

    if (removed_items.length) {
      h += `<div class="diff-section">
        <div class="diff-section-title red">In gist only, not found locally (${removed_items.length})</div>`;
      for (const name of removed_items) {
        h += `<div class="diff-item item-removed">
          <div class="diff-item-hdr">
            <span class="badge">REMOVED</span>
            <span>${esc(name)}</span>
          </div></div>`;
      }
      h += `</div>`;
    }

    if (changedNames.length) {
      h += `<div class="diff-section">
        <div class="diff-section-title amber">Stat Changes — local differs from gist (${changedNames.length})</div>
        <div class="diff-field-row" style="opacity:.45;font-size:10px;padding:3px 12px">
          <span>Field</span><span>Gist (online)</span><span>Local (game file)</span>
        </div>`;
      for (const name of changedNames) {
        const diffs = changes[name];
        const fields = Object.entries(diffs);
        const uid = 'f' + Math.random().toString(36).slice(2);
        h += `<div class="diff-item item-changed">
          <div class="diff-item-hdr" onclick="toggleFields('${uid}')">
            <span class="badge">${fields.length} field${fields.length > 1 ? 's' : ''}</span>
            <span>${esc(name)}</span>
            <span style="margin-left:auto;font-size:10px;opacity:.5">▼</span>
          </div>
          <div class="diff-fields" id="${uid}">`;
        for (const [field, [onlineVal, localVal]] of fields) {
          const onlineS = (onlineVal === null || onlineVal === undefined) ? '(not set)' : JSON.stringify(onlineVal);
          const localS  = (localVal  === null || localVal  === undefined) ? '(not set)' : JSON.stringify(localVal);
          h += `<div class="diff-field-row">
            <span class="field-name">${esc(field)}</span>
            <span class="field-old" title="online / gist">${esc(onlineS)}</span>
            <span class="field-new" title="local / game file">${esc(localS)}</span>
          </div>`;
        }
        h += `</div></div>`;
      }
      h += `</div>`;
    }

    setContent(h);
  }

  function toggleFields(id) {
    document.getElementById(id).classList.toggle('open');
  }

  // ── PARSE RENDERER ──────────────────────────────────────
  function renderParse(data) {
    const { item_type, content, filename } = data;
    const title = item_type.charAt(0).toUpperCase() + item_type.slice(1);
    const lines = content.split('\n').length;
    setContent(`
      <div class="result-hdr">
        <span class="result-title">${esc(title)}</span>
        <span style="color:var(--text-dim);font-size:12px">${lines} lines</span>
        <a class="dl-btn" href="/download/${esc(filename)}">⬇ Download</a>
      </div>
      <div class="parse-result"><pre>${esc(content)}</pre></div>
    `);
  }

  // ── ALL FILES RENDERER ──────────────────────────────────
  function renderAll(data) {
    const { files } = data;
    let h = `
      <div class="result-hdr">
        <span class="result-title">All Items Parsed</span>
        <span style="color:var(--text-dim);font-size:12px">${files.length} files written to output/</span>
      </div>
      <div class="files-grid">`;
    for (const f of files) {
      const label = f.item_type.charAt(0).toUpperCase() + f.item_type.slice(1);
      h += `<div class="file-card">
        <div>
          <div class="file-card-name">${esc(label)}</div>
          <div class="file-card-sub">${esc(f.filename)}</div>
        </div>
        <a class="dl-btn" href="/download/${esc(f.filename)}">⬇ Download</a>
      </div>`;
    }
    h += `</div>`;
    setContent(h);
  }

  loadSettings();
</script>
</body>
</html>
